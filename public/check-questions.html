<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Check Quiz Questions</title>
  <style>
    body { 
      font-family: monospace; 
      padding: 20px; 
      background: #1e1e1e;
      color: #d4d4d4;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      margin: 10px 5px;
      cursor: pointer;
      background: #0e639c;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #1177bb; }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #252526;
      border: 1px solid #3e3e42;
      border-radius: 4px;
      white-space: pre-wrap;
      max-height: 600px;
      overflow-y: auto;
    }
    .success { color: #4ec9b0; }
    .error { color: #f48771; }
    .warning { color: #dcdcaa; }
    .info { color: #9cdcfe; }
    input {
      width: 400px;
      padding: 10px;
      font-size: 14px;
      margin: 10px 0;
      background: #3c3c3c;
      border: 1px solid #3e3e42;
      color: #d4d4d4;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>🔍 Quiz Questions Checker</h1>
  <input type="text" id="quizId" placeholder="Enter Quiz ID (mGEoMyTxuttzEKxHy9CM)" value="mGEoMyTxuttzEKxHy9CM" />
  <br>
  <button onclick="checkQuiz()">Check This Quiz</button>
  <button onclick="listAllQuizzes()">List All My Quizzes</button>
  <div id="result"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, getDoc, getDocs, doc, collection, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getAuth } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    // Get config from localStorage (same as main app)
    const config = JSON.parse(localStorage.getItem('firebaseConfig') || '{}');
    
    const app = initializeApp(config);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.db = db;
    window.auth = auth;

    window.checkQuiz = async function() {
      const quizId = document.getElementById('quizId').value.trim();
      const result = document.getElementById('result');
      
      if (!quizId) {
        result.innerHTML = '<span class="error">Please enter a Quiz ID</span>';
        return;
      }

      result.innerHTML = '<span class="info">Checking...</span>';

      try {
        // Check metadata
        const quizDoc = await getDoc(doc(db, 'quizzes', quizId));
        
        if (!quizDoc.exists()) {
          result.innerHTML = '<span class="error">❌ Quiz not found!</span>';
          return;
        }

        const data = quizDoc.data();
        
        // Check questions subcollection
        const questionsSnap = await getDocs(collection(db, 'quizzes', quizId, 'questions'));
        
        let output = '';
        output += '═══════════════════════════════════════\n';
        output += '📋 QUIZ: ' + data.title + '\n';
        output += '═══════════════════════════════════════\n\n';
        
        output += 'ID: ' + quizId + '\n';
        output += 'Status: ' + data.status + '\n';
        output += 'Visibility: ' + data.visibility + '\n';
        output += 'Created By: ' + data.createdBy + '\n\n';
        
        output += '═══════════════════════════════════════\n';
        output += '📝 QUESTIONS: ' + questionsSnap.docs.length + '\n';
        output += '═══════════════════════════════════════\n\n';
        
        if (questionsSnap.docs.length === 0) {
          output += '<span class="error">❌ NO QUESTIONS FOUND!\n\n';
          output += 'This quiz is EMPTY. You need to:\n';
          output += '1. Add questions via Edit page\n';
          output += '2. OR use AI Generator\n';
          output += '3. OR manually add in Firestore Console\n</span>';
        } else {
          output += '<span class="success">✅ Questions found!\n\n</span>';
          questionsSnap.docs.forEach((doc, i) => {
            const q = doc.data();
            output += `Q${i+1} (${doc.id}): ${q.questionText?.substring(0, 60)}...\n`;
            output += `   Type: ${q.type}, Points: ${q.points || 10}\n`;
            output += `   Answers: ${q.answers?.length || 0}\n\n`;
          });
        }

        // Check if questions field exists in parent doc
        if ('questions' in data) {
          output += '\n⚠️ WARNING: Quiz document has "questions" field!\n';
          output += '   This is OLD structure. Should be in subcollection.\n';
          output += '   Count in doc: ' + (data.questions?.length || 0) + '\n';
        }

        result.innerHTML = output;

      } catch (err) {
        result.innerHTML = '<span class="error">❌ ERROR: ' + err.message + '</span>';
      }
    };

    window.listAllQuizzes = async function() {
      const result = document.getElementById('result');
      const user = auth.currentUser;
      
      if (!user) {
        result.innerHTML = '<span class="error">❌ You must be logged in!</span>';
        return;
      }

      result.innerHTML = '<span class="info">Loading your quizzes...</span>';

      try {
        const q = query(
          collection(db, 'quizzes'),
          where('createdBy', '==', user.uid)
        );
        const snapshot = await getDocs(q);
        
        let output = '';
        output += '═══════════════════════════════════════\n';
        output += '📚 YOUR QUIZZES (' + snapshot.docs.length + ')\n';
        output += '═══════════════════════════════════════\n\n';

        for (const quizDoc of snapshot.docs) {
          const data = quizDoc.data();
          const questionsSnap = await getDocs(collection(db, 'quizzes', quizDoc.id, 'questions'));
          const qCount = questionsSnap.docs.length;
          
          output += '📋 ' + (data.title || 'Untitled') + '\n';
          output += '   ID: ' + quizDoc.id + '\n';
          output += '   Status: ' + data.status + '\n';
          output += '   Questions: ';
          
          if (qCount === 0) {
            output += '<span class="error">❌ ' + qCount + ' (EMPTY!)</span>\n';
          } else {
            output += '<span class="success">✅ ' + qCount + '</span>\n';
          }
          
          output += '   URL: /quiz/' + quizDoc.id + '/preview\n\n';
        }

        if (snapshot.empty) {
          output += '<span class="warning">No quizzes found</span>';
        }

        result.innerHTML = output;

      } catch (err) {
        result.innerHTML = '<span class="error">❌ ERROR: ' + err.message + '</span>';
      }
    };

    // Auto-check on load if quiz ID present
    window.addEventListener('load', () => {
      const quizId = document.getElementById('quizId').value;
      if (quizId) {
        checkQuiz();
      }
    });
  </script>
</body>
</html>
